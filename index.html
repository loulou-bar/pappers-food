<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pappers Food</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="login-screen">
    <h1>Pappers Food</h1>
    <p>Choisissez où déjeuner avec vos collègues</p>
    <button id="login-btn">Se connecter avec Google</button>
  </div>

  <div id="app" hidden>
    <header>
      <h1>Pappers Food</h1>
      <div id="user-info">
        <span id="user-name"></span>
        <button id="logout-btn">Déconnexion</button>
      </div>
    </header>

    <main>
      <section id="lunch-section">
        <div class="lunch-header">
          <div>
            <h2>Déjeuner — <span id="lunch-date-label"></span></h2>
            <p id="lunch-deadline" class="deadline-label"></p>
          </div>
          <button id="suggest-toggle-btn" onclick="toggleSuggestForm()" hidden>+ Proposer</button>
        </div>

        <div id="suggest-form" hidden>
          <select id="suggest-select">
            <option value="">Choisir un restaurant...</option>
          </select>
          <div class="suggest-actions">
            <button onclick="submitSuggestion()">Proposer</button>
            <button onclick="toggleSuggestForm()" class="btn-secondary">Annuler</button>
          </div>
        </div>

        <div id="lunch-groups"></div>
      </section>

      <section id="add-section">
        <h2>Proposer un restaurant</h2>
        <form id="add-form">
          <div class="form-grid">
            <div id="place-ac-container" class="full-width">
              <input type="text" id="place-ac-fallback" placeholder="Rechercher un restaurant..." autocomplete="off" style="width:100%">
            </div>
            <input type="text" id="resto-cuisine" placeholder="Type de cuisine (ex: Italien)">
            <input type="text" id="resto-address" placeholder="Adresse">
            <input type="url" id="resto-maps-url" placeholder="Lien Google Maps">
            <input type="number" id="resto-google-rating" placeholder="Note Google Maps (ex: 4.3)" min="1" max="5" step="0.1">
            <select id="resto-price-range">
              <option value="">Gamme de prix</option>
              <option value="€">€ — Bon marché</option>
              <option value="€€">€€ — Modéré</option>
              <option value="€€€">€€€ — Haut de gamme</option>
              <option value="€€€€">€€€€ — Très haut de gamme</option>
            </select>
            <input type="text" id="resto-hours" placeholder="Horaires (ex: Lun-Ven 12h-14h)" class="full-width">
          </div>
          <button type="submit">Ajouter</button>
        </form>
      </section>

      <section id="list-section">
        <h2>Les restaurants</h2>
        <div id="resto-list"></div>
      </section>
    </main>
  </div>

  <script src="config.js"></script>
  <script>
    const s = document.createElement('script')
    s.src = `https://maps.googleapis.com/maps/api/js?key=${CONFIG.GOOGLE_MAPS_KEY}&loading=async&libraries=places`
    s.async = true
    document.head.appendChild(s)
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
